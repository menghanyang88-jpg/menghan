<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>连享会 2026 五一论文班 FAQ</title>
<link rel="icon" href="data:,">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  .qa-answer { transition: all 0.2s ease; }
  .qa-chevron.open { transform: rotate(180deg); }
  .filter-btn.active { background-color: #111827 !important; color: white !important; }
  #aiResponse.ai-scroll {
    max-height: min(56vh, 520px);
    overflow-y: auto;
    overscroll-behavior: contain;
    scrollbar-gutter: stable;
    padding-right: 4px;
  }
  #aiResponse.ai-scroll::-webkit-scrollbar { width: 9px; }
  #aiResponse.ai-scroll::-webkit-scrollbar-track { background: #EEF2FF; border-radius: 999px; }
  #aiResponse.ai-scroll::-webkit-scrollbar-thumb { background: #A5B4FC; border-radius: 999px; border: 2px solid #EEF2FF; }
  #aiResponse.ai-scroll::-webkit-scrollbar-thumb:hover { background: #818CF8; }
  #aiAnswerText { font-size: 0.875rem; line-height: 1.6; }
  #aiAnswerText h2 { font-size: 1rem; font-weight: 600; margin: 0.6rem 0 0.2rem; color: #1e1b4b; }
  #aiAnswerText h3 { font-size: 0.95rem; font-weight: 600; margin: 0.5rem 0 0.15rem; color: #312e81; }
  #aiAnswerText h4 { font-size: 0.9rem; font-weight: 600; margin: 0.4rem 0 0.1rem; color: #312e81; }
  #aiAnswerText p { margin: 0.3rem 0; }
  #aiAnswerText ul { list-style: disc; padding-left: 1.25rem; margin: 0.2rem 0; }
  #aiAnswerText ol { list-style: decimal; padding-left: 1.25rem; margin: 0.2rem 0; }
  #aiAnswerText li { margin: 0.1rem 0; }
  #aiAnswerText li > p { margin: 0; display: inline; }
  #aiAnswerText code { background: #E0E7FF; padding: 0.1rem 0.35rem; border-radius: 0.25rem; font-size: 0.8em; font-family: ui-monospace, monospace; }
  #aiAnswerText pre { background: #1E1B4B; color: #E0E7FF; padding: 0.75rem 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.4rem 0; font-size: 0.8rem; line-height: 1.5; }
  #aiAnswerText pre code { background: none; padding: 0; color: inherit; font-size: inherit; }
  #aiAnswerText strong { font-weight: 600; }
  @media print { .no-print { display: none; } }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
  <div class="max-w-4xl mx-auto px-4 py-4">
    <h1 id="pageTitle" class="text-2xl font-bold text-gray-900">连享会26五一论文班 常见问题</h1>
    <p class="text-sm text-gray-500 mt-1">
      <span id="pageSubtitle">基于群聊天记录及先导课提取</span>，共 <span id="totalCount" class="font-semibold text-gray-700">0</span> 条常见问题
    </p>
  </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-6">

  <div class="bg-white rounded-xl border border-indigo-200 border-l-4 border-l-indigo-500 p-5 mb-6" id="aiChat">
    <div class="flex items-center gap-2 mb-3">
      <span class="text-lg">&#x1F916;</span>
      <h3 class="text-base font-semibold text-gray-900">问问AI</h3>
      <span class="text-xs text-gray-400">基于微信群聊天记录智能整理</span>
    </div>
    <div class="flex gap-2">
      <input type="text" id="aiInput" placeholder="输入你的问题..."
             class="flex-1 px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
      <button id="aiSendBtn" onclick="askAI()"
              class="px-4 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
        发送
      </button>
    </div>

    <div id="aiResponse" class="hidden ai-scroll mt-4">
      <div id="aiLoading" class="hidden">
        <div class="animate-pulse space-y-2">
          <div class="h-4 bg-gray-200 rounded w-3/4"></div>
          <div class="h-4 bg-gray-200 rounded w-1/2"></div>
          <div class="h-4 bg-gray-200 rounded w-5/6"></div>
        </div>
        <p class="text-xs text-gray-400 mt-2" id="aiLoadingText">正在搜索相关问题...</p>
      </div>

      <div id="aiAnswer" class="hidden">
        <div class="bg-indigo-50 border border-indigo-200 rounded-lg p-4">
          <div class="flex justify-between items-start mb-2">
            <span class="text-sm font-medium text-indigo-800">AI 回答</span>
            <button onclick="closeAIAnswer()" class="text-gray-400 hover:text-gray-600 text-lg leading-none">&times;</button>
          </div>
          <div id="aiAnswerText" class="prose prose-sm max-w-none text-gray-700 leading-relaxed"></div>

          <div id="aiSources" class="mt-3 pt-3 border-t border-indigo-200">
            <p class="text-xs text-gray-500 mb-2">参考来源：</p>
            <div id="aiSourceList" class="space-y-1"></div>
          </div>

          <div class="mt-3 bg-amber-50 border border-amber-200 rounded p-2 text-xs text-amber-700">
            此回答由AI自动生成，仅供参考。如有疑问请以群内老师的回复为准。
          </div>
        </div>
      </div>

      <div id="aiError" class="hidden">
        <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-sm text-red-700">
          <p id="aiErrorText"></p>
          <button onclick="askAI()" class="mt-2 px-3 py-1 bg-red-100 rounded text-xs hover:bg-red-200">重试</button>
        </div>
      </div>
    </div>
  </div>

  <div class="no-print mb-6 space-y-3">
    <div class="relative">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input type="text" id="searchInput" placeholder="搜索问题、答案或关键词..."
             class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
             oninput="filterItems()">
    </div>
    <div class="flex flex-wrap gap-2" id="categoryFilters"></div>
  </div>

  <div id="qaList"></div>

  <div id="noResults" class="hidden text-center py-12 text-gray-400">
    <svg class="w-12 h-12 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    <p>没有找到匹配的问题</p>
  </div>

</main>

<footer class="border-t border-gray-200 bg-white mt-12">
  <div class="max-w-4xl mx-auto px-4 py-4 text-center text-xs text-gray-400" id="footerText">
    数据来源：微信群聊天记录 | 自动生成 FAQ
  </div>
</footer>

<script>
let faqs = [];
let meta = {};
let currentCategory = '全部';
let aiLastQuestion = '';
let _isComposing = false;

const categoryColors = {
  '安装配置': 'bg-blue-100 text-blue-800',
  '工具使用': 'bg-green-100 text-green-800',
  '课程安排': 'bg-purple-100 text-purple-800',
  '账号付费': 'bg-red-100 text-red-800',
  '模型选择': 'bg-orange-100 text-orange-800',
  '课程资料': 'bg-cyan-100 text-cyan-800',
  '其他': 'bg-gray-100 text-gray-800',
  '未分类': 'bg-gray-100 text-gray-800'
};

const _markedRenderer = new marked.Renderer();
_markedRenderer.link = ({href, text}) => {
  return `<a href="${href}" class="text-indigo-600 font-medium hover:underline" target="_blank">${text}</a>`;
};
marked.setOptions({ renderer: _markedRenderer, breaks: true, gfm: true });

function normalize(value) {
  return String(value || '').toLowerCase().trim();
}

function escapeHtml(text) {
  return String(text ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function answerToHtml(answer) {
  return String(answer || '')
    .split(/\n{2,}/)
    .map(part => `<p>${escapeHtml(part).replaceAll('\n', '<br>')}</p>`)
    .join('');
}

function getItemId(item, index) {
  return item.id || `Q${String(index + 1).padStart(3, '0')}`;
}

function getCategoryCounts() {
  const counts = new Map();
  faqs.forEach(item => {
    const category = item.category || '未分类';
    counts.set(category, (counts.get(category) || 0) + 1);
  });
  return [...counts.entries()].sort((a, b) => b[1] - a[1]);
}

function renderHeader() {
  document.getElementById('pageTitle').textContent = meta.title || '连享会26五一论文班 常见问题';
  document.getElementById('pageSubtitle').textContent = '基于群聊天记录及先导课提取';
  document.getElementById('totalCount').textContent = faqs.length;
  document.title = meta.title || '连享会 2026 五一论文班 FAQ';
  document.getElementById('footerText').textContent =
    `${meta.subtitle || '数据来源：微信群聊天记录'} | 共 ${faqs.length} 条 FAQ`;
}

function renderCategoryFilters() {
  const filters = [['全部', faqs.length], ...getCategoryCounts()];
  document.getElementById('categoryFilters').innerHTML = filters.map(([name, count]) => {
    const active = name === currentCategory;
    const cls = active
      ? 'filter-btn active px-3 py-1.5 rounded-full text-sm font-medium bg-gray-900 text-white'
      : 'filter-btn px-3 py-1.5 rounded-full text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200';
    const countHtml = name === '全部' ? '' : ` <span class="text-gray-400">(${count})</span>`;
    return `<button class="${cls}" data-cat="${escapeHtml(name)}" onclick="filterCategory('${escapeHtml(name)}')">${escapeHtml(name)}${countHtml}</button>`;
  }).join('');
}

function renderList() {
  document.getElementById('qaList').innerHTML = faqs.map((item, index) => {
    const id = getItemId(item, index);
    const category = item.category || '未分类';
    const categoryClass = categoryColors[category] || categoryColors['其他'];
    const keywords = Array.isArray(item.keywords) ? item.keywords : [];
    const hot = Number(item.frequency || 0) > 1
      ? `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800">被问${escapeHtml(item.frequency)}次</span>`
      : '';
    const keywordText = keywords.join(' ');
    return `
      <div class="qa-item border border-gray-200 rounded-lg mb-3 overflow-hidden hover:shadow-md transition-shadow bg-white"
           id="qa-${escapeHtml(id)}"
           data-category="${escapeHtml(category)}"
           data-question="${escapeHtml(normalize(item.question))}"
           data-keywords="${escapeHtml(normalize(keywordText))}"
           data-answer="${escapeHtml(normalize(item.answer))}"
           data-frequency="${escapeHtml(item.frequency || 1)}">
        <button class="w-full px-5 py-4 text-left flex items-start gap-3 hover:bg-gray-50 transition-colors qa-toggle" onclick="toggleAnswer(this)">
          <span class="text-gray-400 font-mono text-sm mt-0.5 shrink-0">${escapeHtml(id)}</span>
          <div class="flex-1 min-w-0">
            <div class="flex flex-wrap items-center gap-2 mb-1">
              <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${categoryClass}">${escapeHtml(category)}</span>
              ${hot}
            </div>
            <h3 class="text-base font-medium text-gray-900 leading-snug">${escapeHtml(item.question)}</h3>
          </div>
          <svg class="w-5 h-5 text-gray-400 shrink-0 mt-1 transform transition-transform qa-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
        <div class="qa-answer hidden px-5 pb-4 pl-16">
          <div class="prose prose-sm max-w-none text-gray-700 leading-relaxed">${answerToHtml(item.answer)}</div>
          <div class="mt-3 flex flex-wrap items-center gap-2 text-xs text-gray-400">
            ${item.source ? `<span>来源: ${escapeHtml(item.source)}</span><span>&middot;</span>` : ''}
            ${item.date ? `<span>${escapeHtml(item.date)}</span>` : ''}
          </div>
          <div class="mt-2 flex flex-wrap gap-1">
            ${keywords.map(word => `<span class="inline-block px-1.5 py-0.5 text-xs bg-gray-50 text-gray-500 rounded">${escapeHtml(word)}</span>`).join(' ')}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleAnswer(btn) {
  const answer = btn.nextElementSibling;
  const chevron = btn.querySelector('.qa-chevron');
  answer.classList.toggle('hidden');
  chevron.classList.toggle('open');
}

function filterCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === cat);
  });
  filterItems();
}

function filterItems() {
  const query = normalize(document.getElementById('searchInput').value);
  const items = document.querySelectorAll('.qa-item');
  let visible = 0;

  items.forEach(item => {
    const matchCat = currentCategory === '全部' || item.dataset.category === currentCategory;
    let matchSearch = true;
    if (query) {
      matchSearch = item.dataset.question.includes(query) ||
                    item.dataset.keywords.includes(query) ||
                    item.dataset.answer.includes(query);
    }
    if (matchCat && matchSearch) {
      item.style.display = '';
      visible++;
    } else {
      item.style.display = 'none';
    }
  });

  document.getElementById('noResults').classList.toggle('hidden', visible > 0);
}

function renderMarkdown(text) {
  text = String(text || '').replace(/\[Q(\d+)\]/g, (_, n) => {
    const id = `Q${String(Number(n)).padStart(3, '0')}`;
    return `<a href="javascript:void(0)" class="text-indigo-600 font-medium hover:underline" onclick="expandSource('${id}')">[${id}]</a>`;
  });
  return marked.parse(text);
}

function expandSource(qaId) {
  const sourceList = document.getElementById('aiSourceList');
  if (sourceList) {
    const source = sourceList.querySelector(`[data-source-id="${qaId}"]`);
    if (source) {
      const body = source.querySelector('.source-body');
      const chevron = source.querySelector('.source-chevron');
      if (body && body.classList.contains('hidden')) {
        body.classList.remove('hidden');
        if (chevron) chevron.style.transform = 'rotate(180deg)';
      }
      source.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      source.style.transition = 'background-color 0.3s';
      source.style.backgroundColor = '#EEF2FF';
      setTimeout(() => { source.style.backgroundColor = ''; }, 1500);
      return;
    }
  }
  scrollToQA(qaId);
}

function scrollToQA(qaId) {
  const el = document.getElementById('qa-' + qaId);
  if (!el) return;
  el.scrollIntoView({behavior: 'smooth', block: 'center'});
  const answer = el.querySelector('.qa-answer');
  const chevron = el.querySelector('.qa-chevron');
  if (answer && answer.classList.contains('hidden')) {
    answer.classList.remove('hidden');
    chevron && chevron.classList.add('open');
  }
  el.style.transition = 'background-color 0.3s';
  el.style.backgroundColor = '#FEF3C7';
  setTimeout(() => { el.style.backgroundColor = ''; }, 2000);
}

async function askAI() {
  const input = document.getElementById('aiInput');
  const question = input.value.trim();
  if (!question) return;

  aiLastQuestion = question;
  document.getElementById('aiResponse').classList.remove('hidden');
  document.getElementById('aiLoading').classList.remove('hidden');
  document.getElementById('aiAnswer').classList.add('hidden');
  document.getElementById('aiError').classList.add('hidden');
  document.getElementById('aiSendBtn').disabled = true;
  document.getElementById('aiLoadingText').textContent = '正在搜索相关问题...';

  setTimeout(() => {
    const el = document.getElementById('aiLoadingText');
    if (el && !el.closest('#aiLoading').classList.contains('hidden')) {
      el.textContent = '正在生成回答...';
    }
  }, 1000);

  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 90000);
    const resp = await fetch('/api/ask', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question, top_k: 5}),
      signal: ctrl.signal
    });
    clearTimeout(timer);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    document.getElementById('aiLoading').classList.add('hidden');
    document.getElementById('aiAnswer').classList.remove('hidden');
    document.getElementById('aiAnswerText').innerHTML = renderMarkdown(data.answer || '');

    const sourceList = document.getElementById('aiSourceList');
    sourceList.innerHTML = '';
    if (data.sources && data.sources.length > 0) {
      data.sources.forEach(source => {
        const wrapper = document.createElement('div');
        wrapper.className = 'bg-white rounded border border-indigo-100 overflow-hidden text-xs';
        wrapper.dataset.sourceId = source.id;
        const header = document.createElement('div');
        header.className = 'flex items-center gap-2 px-3 py-2 cursor-pointer hover:bg-indigo-50 transition-colors';
        header.innerHTML = `<span class="font-mono text-indigo-600 shrink-0">${escapeHtml(source.id)}</span><span class="text-gray-700 flex-1">${escapeHtml(source.question)}</span><span class="text-gray-400 shrink-0">${escapeHtml(source.similarity)}</span><svg class="w-4 h-4 text-gray-400 shrink-0 transition-transform source-chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>`;
        const body = document.createElement('div');
        body.className = 'source-body hidden px-3 pb-3 pt-1 border-t border-indigo-50 text-gray-600 leading-relaxed whitespace-pre-line';
        body.textContent = source.answer || '';
        header.onclick = () => {
          body.classList.toggle('hidden');
          header.querySelector('.source-chevron').style.transform = body.classList.contains('hidden') ? '' : 'rotate(180deg)';
        };
        wrapper.appendChild(header);
        wrapper.appendChild(body);
        sourceList.appendChild(wrapper);
      });
    }
    document.getElementById('aiSources').classList.toggle('hidden', !data.sources || data.sources.length === 0);
  } catch (err) {
    document.getElementById('aiLoading').classList.add('hidden');
    document.getElementById('aiError').classList.remove('hidden');
    document.getElementById('aiErrorText').textContent =
      err.name === 'AbortError' ? 'AI回答超时，请稍后重试。' :
      err.message.includes('Failed to fetch') ? '网络连接异常，无法获取AI回答。请检查服务是否启动。' :
      `请求失败: ${err.message}`;
  } finally {
    document.getElementById('aiSendBtn').disabled = false;
  }
}

function closeAIAnswer() {
  document.getElementById('aiResponse').classList.add('hidden');
}

async function loadData() {
  const qaResp = await fetch('/api/qa');
  const data = await qaResp.json();
  meta = data.meta || {};
  faqs = data.faqs || [];
  renderHeader();
  renderCategoryFilters();
  renderList();
}

const _aiInput = document.getElementById('aiInput');
_aiInput.addEventListener('compositionstart', () => { _isComposing = true; });
_aiInput.addEventListener('compositionend', () => { _isComposing = false; });
_aiInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !_isComposing && !e.isComposing) askAI();
});

loadData().catch(error => {
  document.getElementById('pageSubtitle').textContent = error.message;
});
</script>

</body>
</html>
