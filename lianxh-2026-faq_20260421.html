<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>课程 FAQ 知识页</title>
  <style>
    :root {
      --ink: #17201a;
      --muted: #667266;
      --line: #d9dfd3;
      --paper: #fbfaf3;
      --panel: #ffffff;
      --sage: #9bb49a;
      --sage-dark: #33513c;
      --clay: #c76f48;
      --gold: #d8a342;
      --blue: #416a8c;
      --shadow: 0 18px 50px rgba(37, 50, 35, .10);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(23, 32, 26, .035) 1px, transparent 1px) 0 0 / 28px 28px,
        linear-gradient(rgba(23, 32, 26, .025) 1px, transparent 1px) 0 0 / 28px 28px,
        var(--paper);
      font-family: "Noto Serif SC", "Songti SC", Georgia, serif;
    }

    button, input, select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .hero {
      padding: 42px 0 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(251, 250, 243, .82);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      color: var(--sage-dark);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 34px;
      height: 2px;
      background: var(--clay);
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(34px, 5vw, 64px);
      line-height: .98;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 14px 0 0;
      max-width: 720px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 16px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .icon-btn,
    .text-btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      min-height: 42px;
      border-radius: var(--radius);
      box-shadow: 0 8px 22px rgba(37, 50, 35, .06);
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .icon-btn {
      width: 44px;
      display: grid;
      place-items: center;
      position: relative;
    }

    .text-btn {
      padding: 0 14px;
      font-weight: 700;
    }

    .icon-btn:hover,
    .text-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(37, 50, 35, .10);
    }

    .icon-btn span {
      position: absolute;
      bottom: -34px;
      right: 0;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transform: translateY(-4px);
      transition: .15s ease;
      background: var(--ink);
      color: white;
      font-size: 12px;
      padding: 5px 7px;
      border-radius: 4px;
    }

    .icon-btn:hover span {
      opacity: 1;
      transform: translateY(0);
    }

    .dashboard {
      padding: 28px 0 54px;
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 196px;
      display: grid;
      gap: 14px;
    }

    .panel {
      background: rgba(255, 255, 255, .86);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .stats {
      padding: 16px;
    }

    .stat-main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: #fdfcf8;
    }

    .stat b {
      display: block;
      font-size: 30px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      padding: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .search {
      position: relative;
    }

    .search svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    input[type="search"],
    select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fffef9;
      border-radius: var(--radius);
      min-height: 42px;
      color: var(--ink);
      outline: none;
    }

    input[type="search"] {
      padding: 0 12px 0 40px;
    }

    select {
      padding: 0 12px;
    }

    input[type="search"]:focus,
    select:focus {
      border-color: var(--sage-dark);
      box-shadow: 0 0 0 3px rgba(155, 180, 154, .28);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      background: #fffef9;
      color: var(--ink);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 13px;
    }

    .chip.active {
      background: var(--ink);
      color: white;
      border-color: var(--ink);
    }

    .content-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .content-head h2 {
      margin: 0;
      font-size: 24px;
    }

    .result-note {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .faq-list {
      display: grid;
      gap: 12px;
    }

    .faq {
      overflow: hidden;
      background: rgba(255, 255, 255, .92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 10px 34px rgba(37, 50, 35, .075);
    }

    .faq summary {
      list-style: none;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
      padding: 18px;
      cursor: pointer;
      transition: background .18s ease;
    }

    .faq summary::-webkit-details-marker {
      display: none;
    }

    .faq summary:hover {
      background: rgba(155, 180, 154, .11);
    }

    .q-no {
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      padding-top: 4px;
    }

    .badges {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 4px 8px;
      background: rgba(65, 106, 140, .12);
      color: var(--blue);
      font-size: 12px;
      font-weight: 700;
    }

    .badge.hot {
      background: rgba(199, 111, 72, .14);
      color: #8d3d20;
    }

    .question {
      margin: 0;
      font-size: 18px;
      line-height: 1.55;
    }

    .chev {
      width: 28px;
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 50%;
      display: grid;
      place-items: center;
      transition: transform .2s ease, background .2s ease;
      color: var(--sage-dark);
    }

    details[open] .chev {
      transform: rotate(180deg);
      background: rgba(155, 180, 154, .22);
    }

    .answer {
      padding: 0 18px 18px 66px;
      color: #38433a;
      line-height: 1.85;
    }

    .answer p {
      margin: 0 0 10px;
    }

    .meta {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px dashed var(--line);
      padding-top: 12px;
    }

    .keyword {
      display: inline-flex;
      padding: 3px 7px;
      border-radius: 4px;
      background: #f5f1e6;
    }

    .empty {
      display: none;
      padding: 46px 20px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .65);
    }

    .empty.show {
      display: block;
    }

    .import-box {
      display: none;
      padding: 16px;
      margin-bottom: 14px;
      background: rgba(255, 255, 255, .92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .import-box.show {
      display: block;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      outline: none;
      background: #fffef9;
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.55;
    }

    .import-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 10px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      padding: 12px 14px;
      border-radius: var(--radius);
      background: var(--ink);
      color: white;
      box-shadow: var(--shadow);
      transform: translateY(12px);
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
      z-index: 9;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    @media (max-width: 820px) {
      .hero {
        position: static;
      }

      .hero-grid,
      .dashboard {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }

      .sidebar {
        position: static;
      }

      .content-head {
        align-items: start;
        flex-direction: column;
      }

      .result-note {
        white-space: normal;
      }

      .answer {
        padding-left: 18px;
      }
    }

    @media print {
      .hero,
      .sidebar,
      .import-box {
        position: static;
      }

      .actions,
      .controls,
      .import-box {
        display: none !important;
      }

      body {
        background: white;
      }

      .dashboard {
        display: block;
      }

      .faq {
        box-shadow: none;
        break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="wrap hero-grid">
      <div>
        <div class="eyebrow">FAQ Notebook</div>
        <h1 id="pageTitle">课程 FAQ 知识页</h1>
        <p class="subtitle" id="pageSubtitle">把微信群、课程答疑、录音转写整理成一个可以搜索、筛选和展开阅读的静态网页。</p>
      </div>
      <div class="actions" aria-label="页面操作">
        <button class="icon-btn" id="expandAll" aria-label="全部展开">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span>全部展开</span>
        </button>
        <button class="icon-btn" id="collapseAll" aria-label="全部收起">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span>全部收起</span>
        </button>
        <button class="icon-btn" id="printPage" aria-label="打印">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 8V4h10v4M7 17H5a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2M7 14h10v6H7z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
          <span>打印页面</span>
        </button>
        <button class="text-btn" id="toggleImport">导入 JSON</button>
      </div>
    </div>
  </header>

  <main class="wrap dashboard">
    <aside class="sidebar">
      <section class="panel stats" aria-label="统计概览">
        <div class="stat-main">
          <div class="stat">
            <b id="totalCount">0</b>
            <span>总问题数</span>
          </div>
          <div class="stat">
            <b id="categoryCount">0</b>
            <span>分类数</span>
          </div>
        </div>
        <div id="categoryChips" class="chips"></div>
      </section>

      <section class="panel controls" aria-label="筛选工具">
        <div class="field">
          <label for="searchInput">搜索</label>
          <div class="search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m21 21-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <input id="searchInput" type="search" placeholder="搜索问题、答案、关键词">
          </div>
        </div>
        <div class="field">
          <label for="sortSelect">排序</label>
          <select id="sortSelect">
            <option value="default">默认顺序</option>
            <option value="frequency">高频优先</option>
            <option value="recent">日期较新优先</option>
            <option value="category">按分类排列</option>
          </select>
        </div>
      </section>
    </aside>

    <section>
      <div class="import-box" id="importBox">
        <textarea id="jsonInput" spellcheck="false" aria-label="导入 JSON"></textarea>
        <div class="import-actions">
          <button class="text-btn" id="loadDemo">恢复示例</button>
          <button class="text-btn" id="applyJson">应用数据</button>
        </div>
      </div>

      <div class="content-head">
        <h2>问题列表</h2>
        <div class="result-note" id="resultNote">正在载入...</div>
      </div>
      <div id="faqList" class="faq-list"></div>
      <div id="emptyState" class="empty">没有找到匹配的问题</div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const defaultDataUrl = "lianxh-faq-20260415-20260421.json";

    const demoMeta = {
      title: "AI 工具学习 FAQ",
      subtitle: "示例数据来自常见的 AI 编程、文档处理和学习方法问题。你可以点击“导入 JSON”替换成自己的数据。"
    };

    const demoFaqs = [
      {
        question: "这个页面适合放什么内容？",
        answer: "适合放课程答疑、微信群高频问题、直播录音整理、产品帮助文档、论文写作问题库等。只要内容能整理成“问题-答案-分类-关键词”，就可以放进来。",
        category: "使用场景",
        keywords: ["FAQ", "知识库", "答疑", "课程"],
        frequency: 5,
        source: "示例数据",
        date: "2026-04-20"
      },
      {
        question: "我后面怎么把自己的聊天记录变成这种网页？",
        answer: "先把聊天记录或录音转写整理成结构化数据，再替换本页里的 JSON。推荐字段包括 question、answer、category、keywords、frequency、source、date。字段越稳定，网页越容易维护。",
        category: "数据整理",
        keywords: ["聊天记录", "录音转写", "JSON", "结构化"],
        frequency: 4,
        source: "示例数据",
        date: "2026-04-20"
      },
      {
        question: "必须会写代码才能维护这个页面吗？",
        answer: "不必须。这个版本刻意做成单文件静态网页，日常维护主要是改 JSON 数据。等数据量变大后，可以再升级成“数据文件 + 自动生成网页”的流程。",
        category: "维护方式",
        keywords: ["静态网页", "低代码", "维护"],
        frequency: 3,
        source: "示例数据",
        date: "2026-04-20"
      },
      {
        question: "搜索功能会搜哪些内容？",
        answer: "会同时搜索问题、答案、分类、关键词和来源。比如搜“JSON”可以找到数据替换相关问题，搜“课程”可以找到使用场景相关问题。",
        category: "页面功能",
        keywords: ["搜索", "关键词", "筛选"],
        frequency: 2,
        source: "示例数据",
        date: "2026-04-20"
      },
      {
        question: "这个页面可以发布到哪里？",
        answer: "可以发布到任何静态托管服务，比如 GitHub Pages、Cloudflare Pages、Netlify，或者你的 page.xueheng.site 静态页面服务。因为它只有一个 HTML 文件，部署门槛很低。",
        category: "发布部署",
        keywords: ["GitHub Pages", "Cloudflare Pages", "静态托管", "发布"],
        frequency: 3,
        source: "示例数据",
        date: "2026-04-20"
      },
      {
        question: "FAQ 很多时会不会卡？",
        answer: "几百条 FAQ 用这个版本没有问题。若增长到几千条，可以改成分页、虚拟列表或本地索引。第一版先保持简单可靠。",
        category: "页面功能",
        keywords: ["性能", "分页", "索引"],
        frequency: 1,
        source: "示例数据",
        date: "2026-04-20"
      }
    ];

    let faqs = [...demoFaqs];
    let meta = {...demoMeta};
    let activeCategory = "全部";

    const els = {
      pageTitle: document.querySelector("#pageTitle"),
      pageSubtitle: document.querySelector("#pageSubtitle"),
      totalCount: document.querySelector("#totalCount"),
      categoryCount: document.querySelector("#categoryCount"),
      categoryChips: document.querySelector("#categoryChips"),
      searchInput: document.querySelector("#searchInput"),
      sortSelect: document.querySelector("#sortSelect"),
      faqList: document.querySelector("#faqList"),
      resultNote: document.querySelector("#resultNote"),
      emptyState: document.querySelector("#emptyState"),
      importBox: document.querySelector("#importBox"),
      jsonInput: document.querySelector("#jsonInput"),
      toast: document.querySelector("#toast")
    };

    function normalizeText(value) {
      return String(value || "").toLowerCase().trim();
    }

    function getCategories() {
      const counts = new Map();
      faqs.forEach(item => {
        const category = item.category || "未分类";
        counts.set(category, (counts.get(category) || 0) + 1);
      });
      return [...counts.entries()].sort((a, b) => b[1] - a[1]);
    }

    function formatKeywords(keywords) {
      if (!Array.isArray(keywords)) return [];
      return keywords.filter(Boolean);
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function answerToHtml(answer) {
      return String(answer || "")
        .split(/\n{2,}/)
        .map(part => `<p>${escapeHtml(part).replaceAll("\n", "<br>")}</p>`)
        .join("");
    }

    function renderStats() {
      const categories = getCategories();
      els.totalCount.textContent = faqs.length;
      els.categoryCount.textContent = categories.length;

      const chips = [["全部", faqs.length], ...categories]
        .map(([name, count]) => {
          const active = name === activeCategory ? " active" : "";
          return `<button class="chip${active}" type="button" data-category="${escapeHtml(name)}">${escapeHtml(name)} ${count}</button>`;
        })
        .join("");

      els.categoryChips.innerHTML = chips;
      els.categoryChips.querySelectorAll(".chip").forEach(chip => {
        chip.addEventListener("click", () => {
          activeCategory = chip.dataset.category;
          render();
        });
      });
    }

    function getFilteredItems() {
      const query = normalizeText(els.searchInput.value);
      let items = faqs.filter(item => {
        const categoryOk = activeCategory === "全部" || (item.category || "未分类") === activeCategory;
        const haystack = normalizeText([
          item.question,
          item.answer,
          item.category,
          item.source,
          ...(Array.isArray(item.keywords) ? item.keywords : [])
        ].join(" "));
        return categoryOk && (!query || haystack.includes(query));
      });

      const sort = els.sortSelect.value;
      if (sort === "frequency") {
        items = items.sort((a, b) => (b.frequency || 0) - (a.frequency || 0));
      } else if (sort === "recent") {
        items = items.sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")));
      } else if (sort === "category") {
        items = items.sort((a, b) => String(a.category || "").localeCompare(String(b.category || ""), "zh-Hans-CN"));
      }
      return items;
    }

    function renderList() {
      const items = getFilteredItems();
      els.resultNote.textContent = `显示 ${items.length} / ${faqs.length} 条`;
      els.emptyState.classList.toggle("show", items.length === 0);

      els.faqList.innerHTML = items.map((item, index) => {
        const keywords = formatKeywords(item.keywords);
        const hot = Number(item.frequency || 0) > 1
          ? `<span class="badge hot">被问 ${escapeHtml(item.frequency)} 次</span>`
          : "";
        const keywordHtml = keywords.map(word => `<span class="keyword">${escapeHtml(word)}</span>`).join("");
        return `
          <details class="faq">
            <summary>
              <span class="q-no">Q${String(index + 1).padStart(3, "0")}</span>
              <div>
                <div class="badges">
                  <span class="badge">${escapeHtml(item.category || "未分类")}</span>
                  ${hot}
                </div>
                <h3 class="question">${escapeHtml(item.question)}</h3>
              </div>
              <span class="chev" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </span>
            </summary>
            <div class="answer">
              ${answerToHtml(item.answer)}
              <div class="meta">
                ${item.source ? `<span>来源：${escapeHtml(item.source)}</span>` : ""}
                ${item.date ? `<span>日期：${escapeHtml(item.date)}</span>` : ""}
                ${keywordHtml}
              </div>
            </div>
          </details>
        `;
      }).join("");
    }

    function render() {
      els.pageTitle.textContent = meta.title || "课程 FAQ 知识页";
      els.pageSubtitle.textContent = meta.subtitle || "";
      document.title = els.pageTitle.textContent;
      renderStats();
      renderList();
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      window.setTimeout(() => els.toast.classList.remove("show"), 1800);
    }

    function currentJson() {
      return JSON.stringify({meta, faqs}, null, 2);
    }

    document.querySelector("#toggleImport").addEventListener("click", () => {
      els.importBox.classList.toggle("show");
      els.jsonInput.value = currentJson();
    });

    document.querySelector("#applyJson").addEventListener("click", () => {
      try {
        const parsed = JSON.parse(els.jsonInput.value);
        const nextFaqs = Array.isArray(parsed) ? parsed : parsed.faqs;
        if (!Array.isArray(nextFaqs)) {
          throw new Error("JSON 需要是数组，或包含 faqs 数组。");
        }
        faqs = nextFaqs;
        meta = parsed.meta || meta;
        activeCategory = "全部";
        render();
        showToast("数据已应用");
      } catch (error) {
        showToast(error.message);
      }
    });

    document.querySelector("#loadDemo").addEventListener("click", () => {
      faqs = [...demoFaqs];
      meta = {...demoMeta};
      activeCategory = "全部";
      els.jsonInput.value = currentJson();
      render();
      showToast("已恢复示例数据");
    });

    document.querySelector("#expandAll").addEventListener("click", () => {
      document.querySelectorAll(".faq").forEach(item => item.open = true);
    });

    document.querySelector("#collapseAll").addEventListener("click", () => {
      document.querySelectorAll(".faq").forEach(item => item.open = false);
    });

    document.querySelector("#printPage").addEventListener("click", () => window.print());
    els.searchInput.addEventListener("input", renderList);
    els.sortSelect.addEventListener("change", renderList);

    async function loadInitialData() {
      try {
        const response = await fetch(defaultDataUrl, {cache: "no-store"});
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const parsed = await response.json();
        if (!Array.isArray(parsed.faqs)) {
          throw new Error("默认数据缺少 faqs 数组");
        }
        meta = parsed.meta || meta;
        faqs = parsed.faqs;
      } catch (error) {
        showToast("默认数据加载失败，已使用示例数据");
      }
      render();
    }

    loadInitialData();
  </script>
</body>
</html>
